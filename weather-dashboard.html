<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box input {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            width: 300px;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .search-box input:focus {
            outline: none;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.3);
        }

        .search-box button {
            padding: 12px 30px;
            background: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            color: #667eea;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .search-box button:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .weather-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .city-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .temperature {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .weather-description {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
            text-transform: capitalize;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .detail {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
        }

        .detail-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .weather-icon {
            font-size: 60px;
            text-align: center;
            margin: 20px 0;
        }

        .favorites {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .favorites h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .favorite-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .favorite-btn {
            padding: 10px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .favorite-btn:hover {
            background: #764ba2;
        }

        .favorite-btn.remove {
            background: #ff6b6b;
        }

        .favorite-btn.remove:hover {
            background: #ee5a52;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 20px;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .forecast {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .forecast h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .forecast-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .forecast-day {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .forecast-icon {
            font-size: 30px;
            margin: 10px 0;
        }

        .forecast-temp {
            font-size: 14px;
            color: #666;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .search-box input {
                width: 100%;
            }

            .weather-grid {
                grid-template-columns: 1fr;
            }

            .temperature {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>실시간 날씨 정보 조회 (Real-time Weather Information)</p>
        </header>

        <div class="search-box">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="도시 이름을 입력하세요 (예: Seoul, London, New York)"
                onkeypress="if(event.key==='Enter') searchWeather()"
            >
            <button onclick="searchWeather()">검색</button>
            <button onclick="getLocationWeather()">현재 위치</button>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div class="favorites">
            <h2>⭐ 즐겨찾기</h2>
            <div class="favorite-buttons" id="favoritesList"></div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            데이터를 불러오는 중입니다... ⏳
        </div>

        <div class="weather-grid" id="weatherGrid"></div>

        <div class="forecast" id="forecastContainer" style="display: none;">
            <h2>📅 5일 예보</h2>
            <div class="forecast-grid" id="forecastGrid"></div>
        </div>
    </div>

    <script>
        // OpenWeatherMap API 키 (무료 버전)
        const API_KEY = '5d7f0a78d0b6404299aad5a532dbf516';
        const API_BASE = 'https://api.openweathermap.org/data/2.5';

        let favorites = JSON.parse(localStorage.getItem('weatherFavorites')) || [];

        // 날씨 아이콘 매핑
        const weatherIcons = {
            '01d': '☀️', '01n': '🌙',
            '02d': '⛅', '02n': '🌤️',
            '03d': '☁️', '03n': '☁️',
            '04d': '☁️', '04n': '☁️',
            '09d': '🌧️', '09n': '🌧️',
            '10d': '🌧️', '10n': '🌧️',
            '11d': '⛈️', '11n': '⛈️',
            '13d': '❄️', '13n': '❄️',
            '50d': '🌫️', '50n': '🌫️'
        };

        // 즐겨찾기 렌더링
        function renderFavorites() {
            const container = document.getElementById('favoritesList');
            container.innerHTML = '';

            if (favorites.length === 0) {
                container.innerHTML = '<p style="color: #999;">즐겨찾기가 없습니다. 도시를 검색하면 즐겨찾기에 추가할 수 있습니다.</p>';
                return;
            }

            favorites.forEach(city => {
                const btn = document.createElement('button');
                btn.className = 'favorite-btn';
                btn.innerHTML = `${city} <span style="margin-left: 10px; cursor: pointer;" onclick="removeFavorite('${city}', event)">✕</span>`;
                btn.onclick = () => searchWeatherByCity(city);
                container.appendChild(btn);
            });
        }

        // 즐겨찾기 추가
        function addFavorite(city) {
            if (!favorites.includes(city)) {
                favorites.push(city);
                localStorage.setItem('weatherFavorites', JSON.stringify(favorites));
                renderFavorites();
            }
        }

        // 즐겨찾기 제거
        function removeFavorite(city, event) {
            event.stopPropagation();
            favorites = favorites.filter(c => c !== city);
            localStorage.setItem('weatherFavorites', JSON.stringify(favorites));
            renderFavorites();
        }

        // 도시명으로 날씨 검색
        function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (city) {
                searchWeatherByCity(city);
            }
        }

        // 날씨 조회 메인 함수
        async function searchWeatherByCity(city) {
            showLoading(true);
            clearError();

            try {
                const response = await fetch(
                    `${API_BASE}/weather?q=${city}&appid=${API_KEY}&units=metric&lang=ko`
                );

                if (!response.ok) {
                    throw new Error('도시를 찾을 수 없습니다.');
                }

                const data = await response.json();
                displayWeather(data);
                
                // 5일 예보 조회
                getForecast(data.coord.lat, data.coord.lon);
                
                // 즐겨찾기에 추가
                addFavorite(data.name);
                
                document.getElementById('cityInput').value = '';
            } catch (error) {
                showError(error.message);
            } finally {
                showLoading(false);
            }
        }

        // 현재 위치 기반 날씨
        function getLocationWeather() {
            if (navigator.geolocation) {
                showLoading(true);
                navigator.geolocation.getCurrentPosition(
                    position => {
                        const { latitude, longitude } = position.coords;
                        getWeatherByCoords(latitude, longitude);
                    },
                    error => {
                        showError('위치 정보를 가져올 수 없습니다.');
                        showLoading(false);
                    }
                );
            } else {
                showError('이 브라우저는 위치 서비스를 지원하지 않습니다.');
            }
        }

        // 좌표로 날씨 조회
        async function getWeatherByCoords(lat, lon) {
            try {
                const response = await fetch(
                    `${API_BASE}/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=ko`
                );
                const data = await response.json();
                displayWeather(data);
                getForecast(lat, lon);
                addFavorite(data.name);
            } catch (error) {
                showError('날씨 정보를 가져올 수 없습니다.');
            } finally {
                showLoading(false);
            }
        }

        // 날씨 정보 표시
        function displayWeather(data) {
            const grid = document.getElementById('weatherGrid');
            const icon = weatherIcons[data.weather[0].icon] || '🌤️';

            grid.innerHTML = `
                <div class="weather-card">
                    <div class="city-name">${data.name}, ${data.sys.country}</div>
                    <div class="weather-icon">${icon}</div>
                    <div class="temperature">${Math.round(data.main.temp)}°C</div>
                    <div class="weather-description">${data.weather[0].description}</div>
                    
                    <div class="weather-details">
                        <div class="detail">
                            <div class="detail-label">체감 온도</div>
                            <div class="detail-value">${Math.round(data.main.feels_like)}°C</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">최고/최저</div>
                            <div class="detail-value">${Math.round(data.main.temp_max)}°C / ${Math.round(data.main.temp_min)}°C</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">습도</div>
                            <div class="detail-value">${data.main.humidity}%</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">기압</div>
                            <div class="detail-value">${data.main.pressure} hPa</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">풍속</div>
                            <div class="detail-value">${data.wind.speed} m/s</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">구름</div>
                            <div class="detail-value">${data.clouds.all}%</div>
                        </div>
                    </div>
                    
                    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; font-size: 12px; color: #999;">
                        마지막 업데이트: ${new Date(data.dt * 1000).toLocaleString('ko-KR')}
                    </div>
                </div>
            `;
        }

        // 5일 예보 조회
        async function getForecast(lat, lon) {
            try {
                const response = await fetch(
                    `${API_BASE}/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=ko`
                );
                const data = await response.json();
                displayForecast(data.list);
            } catch (error) {
                console.error('예보 정보를 가져올 수 없습니다.');
            }
        }

        // 예보 정보 표시
        function displayForecast(forecastData) {
            const container = document.getElementById('forecastContainer');
            const grid = document.getElementById('forecastGrid');
            
            // 매일 정오의 데이터만 필터링 (매 8번째 항목 = 24시간 후)
            const dailyForecast = [];
            for (let i = 0; i < forecastData.length; i += 8) {
                if (dailyForecast.length < 5) {
                    dailyForecast.push(forecastData[i]);
                }
            }

            grid.innerHTML = dailyForecast.map(item => {
                const date = new Date(item.dt * 1000);
                const icon = weatherIcons[item.weather[0].icon] || '🌤️';
                return `
                    <div class="forecast-item">
                        <div class="forecast-day">${date.toLocaleDateString('ko-KR', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
                        <div class="forecast-icon">${icon}</div>
                        <div class="forecast-temp">
                            ${Math.round(item.main.temp_max)}°C / ${Math.round(item.main.temp_min)}°C
                        </div>
                        <div style="font-size: 12px; color: #999; margin-top: 5px;">${item.weather[0].description}</div>
                    </div>
                `;
            }).join('');

            container.style.display = 'block';
        }

        // 로딩 표시
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // 에러 표시
        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = '❌ ' + message;
            error.style.display = 'block';
        }

        // 에러 제거
        function clearError() {
            document.getElementById('error').style.display = 'none';
        }

        // 초기화
        function init() {
            renderFavorites();
            // 기본 도시 (서울)
            searchWeatherByCity('Seoul');
        }

        // 페이지 로드 시 초기화
        window.addEventListener('load', init);
    </script>
</body>
</html>
